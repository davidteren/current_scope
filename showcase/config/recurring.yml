# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Self-heal the public sandbox so vandalism (a visitor acting as Owner
  # deleting roles / approving records) is bounded and the fraud walkthrough
  # always has clean props. 15 min: an availability call — an hour of a broken
  # public demo is too long.
  sandbox_reset:
    class: SandboxResetJob
    schedule: every 15 minutes
