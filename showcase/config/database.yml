# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

# SQLite3 write its data on the local filesystem, as such it requires
# persistent disks. If you are deploying to a managed service, you should
# make sure it provides disk persistence, as many don't.
#
# Similarly, if you deploy your application as a Docker container, you must
# ensure the database is located in a persisted volume.
# Paths are relative to Rails.root (/rails/showcase in the image), so all four
# databases land in storage/, which is the Kamal named volume mount point
# (see config/deploy.yml) — the only durable location across deploys.
#
# max_connections (Rails 8.1's SQLite pool key) is set high enough to cover the
# Puma web threads (RAILS_MAX_THREADS) PLUS the in-Puma Solid Queue workers
# (SOLID_QUEUE_IN_PUMA=true), which check out their own connections in the same
# process. Undersizing it starves jobs (or requests) of a connection.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS", 3).to_i + ENV.fetch("SOLID_QUEUE_THREADS", 5).to_i %>
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS", 3).to_i + ENV.fetch("SOLID_QUEUE_THREADS", 5).to_i %>
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS", 3).to_i + ENV.fetch("SOLID_QUEUE_THREADS", 5).to_i %>
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS", 3).to_i + ENV.fetch("SOLID_QUEUE_THREADS", 5).to_i %>
