# Kamal 2 deploy config for the CurrentScope showcase.
#
# Run kamal FROM THIS PROJECT DIR (showcase/) so `builder.context: ..` resolves
# to the repo root — the only build context that contains the engine the path
# gem (`gem "current_scope", path: ".."`) needs:
#   cd showcase && kamal setup    # first deploy (provisions + boots)
#   cd showcase && kamal deploy   # subsequent deploys
#
# Replace every "placeholder" value below before deploying.

service: current_scope_showcase

# Placeholder — your registry image, e.g. ghcr.io/your-user/current_scope_showcase
image: your-user/current_scope_showcase

servers:
  web:
    # SQLite is single-writer: run exactly ONE web host and ONE container. Do NOT
    # scale the web role or add a separate job host — Solid Queue runs INSIDE
    # Puma (SOLID_QUEUE_IN_PUMA below), against the same volume-backed databases.
    - 192.168.0.1   # placeholder — your server's IP or hostname

proxy:
  ssl: true
  host: showcase.example.com   # placeholder — your public hostname

registry:
  # Placeholder registry. `password` names a secret resolved from .kamal/secrets.
  username: your-user
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  # Build from the REPO ROOT (one dir up from this config's project dir) so the
  # path gem is inside the context. Setting `context` also makes Kamal build
  # from the local checkout rather than a clean git clone (which would exclude
  # the parent-dir engine). The Dockerfile is showcase/Dockerfile — the default
  # "Dockerfile" here resolves to it because kamal runs from showcase/.
  context: ..
  dockerfile: Dockerfile

env:
  clear:
    # Run the Solid Queue supervisor inside Puma (single server, single Puma
    # process — puma.rb runs in single mode, so the supervisor has one home).
    SOLID_QUEUE_IN_PUMA: true
    # AR pool = RAILS_MAX_THREADS + SOLID_QUEUE_THREADS (see config/database.yml).
    # The pool MUST cover the Puma web threads PLUS the in-Puma Solid Queue
    # workers, which share this one process. Uncomment to tune:
    # RAILS_MAX_THREADS: 3
    # SOLID_QUEUE_THREADS: 5
  secret:
    # The Rails master key is gitignored and is NEVER baked into the image
    # (see /.dockerignore). Provide it as a Kamal secret, resolved from
    # .kamal/secrets — e.g. that file can contain:
    #   RAILS_MASTER_KEY=$(cat config/master.key)
    # Never commit the key or the resolved secrets file.
    - RAILS_MASTER_KEY

# THE load-bearing line: one named volume persists ALL durable state across
# deploys. The four SQLite databases AND Active Storage uploads live under
# Rails.root/storage, which is /rails/showcase/storage in this image (the app
# sits at /rails/showcase because the path gem forces it one dir below the gem
# root at /rails). Nothing durable lives anywhere else.
volumes:
  - "current_scope_storage:/rails/showcase/storage"

# Keep prior assets available to in-flight requests during a rolling deploy.
asset_path: /rails/showcase/public/assets
