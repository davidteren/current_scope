name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      RUBY_VERSION: 3.4.9
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v6
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.RUBY_VERSION }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.RUBY_VERSION }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest
    # A9: the committed Gemfile.lock tracks the gemspec's declared Rails floor
    # (>= 8.1), so this job runs the suite against the claimed minimum — the
    # floor is proven, not just asserted. (8.0 was ruled out: the management UI's
    # params.expect array handling needs 8.1.)

    # services:
    #  redis:
    #    image: valkey/valkey:8
    #    ports:
    #      - 6379:6379
    #    options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.9
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          # REDIS_URL: redis://localhost:6379/0
        # The engine's bin/rails (rails/engine/commands) runs one command per
        # invocation — `db:test:prepare test` in one call fails on `test`. Split.
        # System tests render the mounted UI in headless Chrome (preinstalled on
        # the runner; cuprite drives it over CDP, --no-sandbox set in the driver)
        # so template errors and layout regressions fail CI, not just unit gaps.
        run: |
          bin/rails db:test:prepare
          bin/rails test
          bin/rails test:system

      # The migrate skill's classifier and call-site rewriter are both
      # security-relevant (a wrong pure_role, or a wrongly deleted authorize,
      # silently changes who can do what) — their self-tests and all template
      # syntax run in CI so regressions go red here, not in a host app
      # mid-migration.
      - name: Migrate-skill checks (self-tests + template syntax)
        run: |
          ruby .claude/skills/current-scope-migrate/scripts/policy_inventory.rb --self-test
          ruby .claude/skills/current-scope-migrate/scripts/callsite_rewrite.rb --self-test
          ruby -c .claude/skills/current-scope-migrate/templates/current_scope_migrate.rake.tt
          ruby -c .claude/skills/current-scope-migrate/templates/backfill_enum_roles.rb.tt
          ruby -c .claude/skills/current-scope-migrate/templates/backfill_rolify.rb.tt

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
