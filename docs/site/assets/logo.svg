  <rect x="18" y="3"  width="11" height="11" rx="2.5" fill="#4d7cfe" opacity="0.28"/>
  <rect x="3"  y="18" width="11" height="11" rx="2.5" fill="#4d7cfe" opacity="0.28"/>
  <rect x="18" y="18" width="11" height="11" rx="2.5" fill="#4d7cfe" opacity="0.55"/>
