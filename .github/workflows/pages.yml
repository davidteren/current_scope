name: docs-site

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - "docs/SECURITY-CHECKLIST.md"
      - ".github/workflows/pages.yml"
  # PRs get the build (never the deploy) so a broken site fails the PR,
  # not the post-merge deploy.
  pull_request:
    paths:
      - "docs/site/**"
      - "docs/SECURITY-CHECKLIST.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege: PR builds get read-only; only the deploy job (main-gated)
# mints an OIDC token and writes to Pages.
permissions:
  contents: read

# Cancel superseded PR builds, but let production deploys finish and queue
# (GitHub's Pages template: never cancel an in-progress deployment).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@v7
      # The security checklist has ONE canonical source: docs/SECURITY-CHECKLIST.md.
      # Copy it into the site at build time (front matter prepended, repo-relative
      # links rewritten to GitHub URLs) so the site page can never drift from it.
      # docs/site/security-checklist.md is gitignored for the same reason.
      - name: Generate security checklist page from the canonical doc
        run: |
          {
            printf -- '---\ntitle: Security & production checklist\nnav_order: 5\n---\n\n'
            sed -e 's|(\.\./README\.md|(https://github.com/davidteren/current_scope/blob/main/README.md|g' \
                -e 's|(guides/|(https://github.com/davidteren/current_scope/blob/main/docs/guides/|g' \
                docs/SECURITY-CHECKLIST.md
          } > docs/site/security-checklist.md
      # The sed rules above only know today's link shapes. Fail the build if
      # any link target that is not absolute or an in-page anchor survived the
      # rewrite, so a new relative-link style breaks CI instead of shipping a 404.
      - name: Assert no unrewritten relative links remain
        run: |
          if grep -oE '\]\([^)]*\)' docs/site/security-checklist.md | grep -vE '^\]\((https?://|#|mailto:)'; then
            echo "::error::docs/SECURITY-CHECKLIST.md has a relative link the sed rewrite does not cover — extend the rewrite step."
            exit 1
          fi
          # Reference-style definitions ([label]: target) bypass the inline
          # check above — hold them to the same bar.
          if grep -nE '^\[[^]]+\]:' docs/site/security-checklist.md | grep -vE '\]:[[:space:]]*(https?://|#|mailto:)'; then
            echo "::error::docs/SECURITY-CHECKLIST.md has a relative reference-style link — extend the rewrite step."
            exit 1
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs/site
          destination: ./_site
      - uses: actions/upload-pages-artifact@v4

  deploy:
    # Deploys come only from main (push or dispatch); PR runs and dispatches
    # from other branches stop after the build job.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
